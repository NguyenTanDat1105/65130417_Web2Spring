<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>THONG TIN XE HOI</title>
</head>
<body>
	<h2>Danh sách sản phẩm</h2>
		<table border="1">
		    <thead>
		        <tr>
		            <th>ID</th>
		            <th>Tên</th>
		            <th>Giá</th>
		        </tr>
		    </thead>
		    <tbody>
		        <tr th:each="c : ${cars}">
		            <td th:text="${c.id}"></td>
		            <td th:text="${c.name}"></td>
		            <td th:text="${c.price}"></td>
		        </tr>
		    </tbody>
		</table>
</body>
</html>
