<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="card mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Thông tin chi tiết</h3>
        </div>
        <div class="card-body" th:if="${sanPham != null}">
            <h4 th:text="${sanPham.tenSp}"></h4>
            <hr>
            <p><strong>Giá:</strong> <span class="text-danger" th:text="${sanPham.gia}"></span> VNĐ</p>
            <p><strong>Loại:</strong> <span th:text="${sanPham.loaiSP.tenLoai}"></span></p>
            <p><strong>Mô tả:</strong></p>
            <p th:text="${sanPham.moTa}"></p>
            <a href="/san-pham" class="btn btn-secondary">Quay lại danh sách</a>
        </div>
        <div class="card-body text-center" th:unless="${sanPham != null}">
            <p class="text-danger">Không tìm thấy sản phẩm!</p>
            <a href="/san-pham" class="btn btn-secondary">Quay lại</a>
        </div>
    </div>
</body>
</html>
