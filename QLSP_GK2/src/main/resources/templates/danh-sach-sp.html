<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 class="text-center mb-4">Hệ Thống Quản Lý Sản Phẩm</h2>
    
    <div class="row">
        <div class="col-md-3">
            <div class="list-group">
                <a href="/san-pham" class="list-group-item list-group-item-action active">Tất cả sản phẩm</a>
                <th:block th:each="loai : ${dsLoai}">
                    <a th:href="@{'/san-pham/loai/' + ${loai.id}}" 
                       th:text="${loai.tenLoai}" 
                       class="list-group-item list-group-item-action"></a>
                </th:block>
            </div>
        </div>

        <div class="col-md-9">
            <div class="row">
                <th:block th:each="sp : ${dsSanPham}">
                    <div class="col-md-4 mb-3">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${sp.tenSp}"></h5>
                                <p class="card-text text-danger fw-bold" th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></p>
                                <a th:href="@{'/san-pham/chi-tiet/' + ${sp.id}}" class="btn btn-primary btn-sm">Xem chi tiết</a>
                            </div>
                        </div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>
</body>
</html>
