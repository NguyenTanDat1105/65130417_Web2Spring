<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Cửa Hàng Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
        }
        .product-card {
            border: none;
            border-radius: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
            background: #fff;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .badge-category {
            background-color: #e9ecef;
            color: #495057;
            font-weight: 500;
        }
        .navbar-brand {
            font-weight: bold;
            color: #0d6efd !important;
        }
        .product-desc {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #6c757d;
            font-size: 0.9em;
        }
        .product-price {
            color: #dc3545;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="/home">Cửa Hàng Quản Lý</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/home">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-lg-3 px-4" href="/admin">Trang Admin</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold">Sản phẩm mới nhất</h2>
            <hr class="w-25">
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="sp : ${dsSanPham}">
            <div class="card h-100 product-card p-3 shadow-sm">
                <div class="card-body">
                    <span class="badge badge-category mb-2" th:text="${sp.loaiSanPham != null ? sp.loaiSanPham.tenLoai : 'Chưa phân loại'}">Loại SP</span>
                    
                    <h5 class="card-title fw-bold mb-2" th:text="${sp.tenSp}">Tên sản phẩm</h5>
                    
                    <div class="product-price mb-3" th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                        10,000,000 VNĐ
                    </div>
                    
                    <p class="card-text product-desc" th:text="${sp.moTa}">
                        Mô tả ngắn gọn về sản phẩm sẽ hiển thị ở đây...
                    </p>
                </div>
                <div class="card-footer bg-transparent border-0">
                    <a th:href="@{'/home/' + ${sp.id}}" class="btn btn-outline-primary w-100 rounded-pill">Xem chi tiết</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row mt-5" th:if="${#lists.isEmpty(dsSanPham)}">
        <div class="col-12 text-center text-muted">
            <p>Hiện tại chưa có sản phẩm nào trong hệ thống.</p>
            <a href="/admin" class="btn btn-primary mt-2">Đến trang Admin để thêm mới</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
