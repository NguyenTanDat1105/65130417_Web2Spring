<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-save { padding: 10px 30px; border-radius: 25px; }
    </style>
</head>
<body>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <div class="card-body">
                    <h3 class="card-title fw-bold text-primary mb-4">
                        <i class="bi bi-pencil-square"></i> Cập nhật sản phẩm
                    </h3>
                    <hr>
                    
                    <form th:action="@{/admin/save}" th:object="${sanpham}" method="post">
                        
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên sản phẩm</label>
                            <input type="text" th:field="*{tenSp}" class="form-control" placeholder="Nhập tên sản phẩm..." required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Giá bán (VNĐ)</label>
                                <input type="number" th:field="*{gia}" class="form-control" placeholder="Ví dụ: 15000000" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Loại sản phẩm</label>
                                <select name="loaiSanPham.id" class="form-select" required>
                                    <option th:each="l : ${dsLoaiSP}" 
                                            th:value="${l.id}" 
                                            th:text="${l.tenLoai}"
                                            th:selected="${sanpham.loaiSanPham != null and l.id == sanpham.loaiSanPham.id}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả chi tiết</label>
                            <textarea th:field="*{moTa}" class="form-control" rows="6" placeholder="Viết mô tả sản phẩm tại đây..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/admin}" class="btn btn-outline-secondary px-4 rounded-pill">Hủy & Quay lại</a>
                            <button type="submit" class="btn btn-primary btn-save shadow">Lưu thay đổi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
