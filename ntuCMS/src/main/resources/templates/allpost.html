<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Post - FIT.NTU</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        .wrapper { display: grid; grid-template-columns: 250px 1fr; grid-template-rows: auto 1fr auto; min-height: 100vh; }
        header { grid-column: 1 / span 2; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 2px solid #333; padding: 10px 20px; }
        aside { background: #fff; border-right: 2px solid #333; }
        .sidebar-menu li a { display: block; padding: 15px 20px; text-decoration: none; color: #333; border-bottom: 1px solid #ccc; }
        main { padding: 30px; background: #fff; }
        
        .table-custom { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table-custom th, .table-custom td { border: 1px solid #333; padding: 10px; text-align: left; }
        .table-custom th { background-color: #f2f2f2; }
        footer { grid-column: 1 / span 2; text-align: center; padding: 10px; border-top: 2px solid #333; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="border: 1px solid #333; padding: 5px; font-size: 10px;">LOGO<br>NTU</div>
            <h2 style="font-size: 14px;">Trường Đại học Nha Trang</h2>
        </div>
        <div class="username">Nguyễn Tấn Đạt</div>
    </header>

    <aside>
        <ul class="sidebar-menu">
            <li><a th:href="@{/}">Dashboard</a></li>
            <li><a th:href="@{/page/all}">Page - List</a></li>
            <li><a th:href="@{/page/new}">Page - Addnew</a></li>
            <li style="background: #e9e9e9; font-weight: bold;"><a th:href="@{/post/all}">Post - List</a></li>
            <li><a th:href="@{/post/new}">Post - Addnew</a></li>
        </ul>
    </aside>

    <main>
        <h3>Danh sách các Post (Bài viết)</h3>
        
        <table class="table-custom">
            <thead>
                <tr>
                    <th style="width: 10%;">ID</th>
                    <th style="width: 40%;">Tiêu đề</th>
                    <th style="width: 20%;">Danh mục</th>
                    <th style="width: 30%;">Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="post : ${listPost}">
                    <td th:text="${post.id}"></td>
                    <td th:text="${post.title}"></td>
                    <td th:text="${post.categoryID}"></td>
                    <td>
                        <a th:href="@{/post/view/{id}(id=${post.id})}">[view]</a>
                        <a href="#">[edit]</a>
                        <a th:href="@{/post/delete/{id}(id=${post.id})}" 
                           onclick="return confirm('Xóa bài viết này?')">[delete]</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer>©2025 by Nguyễn Tấn Đạt – FIT.NTU</footer>
</div>

</body>
</html>
