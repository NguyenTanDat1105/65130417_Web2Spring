<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Dashboard - NTU</title>
    <style>
        /* Cấu hình chung */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f4f4f4;
        }

        /* Bố cục chính dùng Grid */
        .wrapper {
            display: grid;
            grid-template-columns: 250px 1fr; 
            grid-template-rows: auto 1fr auto;
            min-height: 100vh;
        }

        /* Header */
        header {
            grid-column: 1 / span 2; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            border-bottom: 2px solid #333;
            padding: 10px 20px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-placeholder {
            width: 50px;
            height: 50px;
            background: #eee;
            border: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            text-align: center;
        }

        .university-info h2 {
            font-size: 14px;
            color: #0056b3;
            text-transform: uppercase;
        }

        .username {
            font-weight: bold;
            font-size: 18px;
        }

        /* Sidebar */
        aside {
            background: #fff;
            border-right: 2px solid #333;
            padding: 0;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            border-bottom: 1px solid #ccc;
        }

        .sidebar-menu li a {
            display: block;
            padding: 15px 20px;
            text-decoration: none;
            color: #333;
            font-size: 16px;
            transition: 0.3s;
        }

        .sidebar-menu li a:hover {
            background-color: #e9e9e9;
        }

        .sidebar-menu li.active {
            font-weight: bold;
            background-color: #f0f0f0;
            border-bottom: 2px solid #333;
        }

        /* Content Area */
        main {
            background: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #666;
        }

        /* Footer */
        footer {
            grid-column: 1 / span 2;
            text-align: center;
            padding: 10px;
            background: #fff;
            border-top: 2px solid #333;
            font-size: 14px;
        }

    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="logo-section">
                <div class="logo-placeholder">LOGO<br>NTU</div>
                <div class="university-info">
                    <h2>Trường Đại học Nha Trang</h2>
                    <p style="font-size: 12px; font-weight: bold;">KHOA CÔNG NGHỆ THÔNG TIN</p>
                </div>
            </div>
            <div class="username">[UserName]</div>
        </header>

        <aside>
            <ul class="sidebar-menu">
                <li class="active"><a href="#">Dashboard</a></li>
                <li><a href="#">Page - List</a></li>
                <li><a href="#">Page - Addnew</a></li>
                <li><a href="#">Post - List</a></li>
                <li><a href="#">Post - Addnew</a></li>
                <li style="height: 40px;"></li>
                <li style="height: 40px;"></li>
            </ul>
        </aside>

        <main>
            Content
        </main>

        <footer>
            ©2025 by Student Name – FIT.NTU
        </footer>
    </div>

</body>
</html>
