<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm mới Post - FIT.NTU</title>
    <style>
        /* Tận dụng lại bộ CSS khung Dashboard để đồng bộ */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        .wrapper { display: grid; grid-template-columns: 250px 1fr; grid-template-rows: auto 1fr auto; min-height: 100vh; }
        header { grid-column: 1 / span 2; display: flex; justify-content: space-between; align-items: center; 
                 background: #fff; border-bottom: 2px solid #333; padding: 10px 20px; }
        aside { background: #fff; border-right: 2px solid #333; }
        .sidebar-menu li a { display: block; padding: 15px 20px; text-decoration: none; color: #333; border-bottom: 1px solid #ccc; }
        main { padding: 30px; background: #fff; }
        footer { grid-column: 1 / span 2; text-align: center; padding: 10px; border-top: 2px solid #333; }

        /* Form Post Style */
        .form-container { max-width: 650px; border: 1px solid #333; padding: 20px; background: #fafafa; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 5px; color: #0056b3; }
        .form-group input, .form-group textarea, .form-group select { 
            padding: 8px; border: 1px solid #333; font-size: 14px; 
        }
        .btn-group { text-align: right; margin-top: 10px; }
        .btn-save { background: #333; color: #fff; padding: 10px 25px; border: none; cursor: pointer; font-weight: bold; }
        .btn-save:hover { background: #555; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="border: 1px solid #333; padding: 5px; font-size: 10px;">LOGO<br>NTU</div>
            <div>
                <h2 style="font-size: 14px;">Trường Đại học Nha Trang</h2>
                <p style="font-size: 11px; font-weight: bold;">HỆ THỐNG QUẢN TRỊ NỘI DUNG</p>
            </div>
        </div>
        <div class="username">Nguyễn Tấn Đạt</div>
    </header>

    <aside>
        <ul class="sidebar-menu">
            <li><a th:href="@{/}">Dashboard</a></li>
            <li><a th:href="@{/page/all}">Page - List</a></li>
            <li><a th:href="@{/page/new}">Page - Addnew</a></li>
            <li><a th:href="@{/post/all}">Post - List</a></li>
            <li style="background: #e9e9e9; font-weight: bold;"><a th:href="@{/post/new}">Post - Addnew</a></li>
        </ul>
    </aside>

    <main>
        <h3 style="margin-bottom: 20px; border-left: 5px solid #333; padding-left: 10px;">Đăng bài viết mới</h3>
        
        <div class="form-container">
            <form th:action="@{/post/new}" method="post">
                
                <div class="form-group">
                    <label>Mã bài viết (ID):</label>
                    <input type="text" name="id" required placeholder="Ví dụ: 1">
                </div>

                <div class="form-group">
                    <label>Tiêu đề bài viết:</label>
                    <input type="text" name="title" required placeholder="Nhập tiêu đề...">
                </div>

                <div class="form-group">
                    <label>Danh mục (Category ID):</label>
                    <select name="cID">
                        <option value="Tin tức">Tin tức</option>
                        <option value="Thông báo">Thông báo</option>
                        <option value="Sự kiện">Sự kiện</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Nội dung bài viết:</label>
                    <textarea name="content" rows="8" placeholder="Viết nội dung tại đây..."></textarea>
                </div>

                <div class="btn-group">
                    <button type="reset" style="padding: 10px; background: none; border: none; cursor: pointer; text-decoration: underline;">Hủy bỏ</button>
                    <button type="submit" class="btn-save">Đăng bài viết</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        ©2025 by Nguyễn Tấn Đạt – FIT.NTU
    </footer>
</div>

</body>
</html>
