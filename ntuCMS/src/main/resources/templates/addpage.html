<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm mới Page - FIT.NTU</title>
    <style>
        /* Giữ nguyên layout Dashboard */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        .wrapper { display: grid; grid-template-columns: 250px 1fr; grid-template-rows: auto 1fr auto; min-height: 100vh; }
        header { grid-column: 1 / span 2; display: flex; justify-content: space-between; align-items: center; 
                 background: #fff; border-bottom: 2px solid #333; padding: 10px 20px; }
        aside { background: #fff; border-right: 2px solid #333; }
        .sidebar-menu li a { display: block; padding: 15px 20px; text-decoration: none; color: #333; border-bottom: 1px solid #ccc; }
        main { padding: 30px; background: #fff; }
        footer { grid-column: 1 / span 2; text-align: center; padding: 10px; border-top: 2px solid #333; }

        /* Style cho Form đúng theo wireframe */
        .form-container { max-width: 600px; border: 1px solid #333; padding: 20px; }
        .form-group { margin-bottom: 15px; display: flex; align-items: flex-start; }
        .form-group label { width: 150px; font-weight: bold; padding-top: 5px; }
        .form-group input, .form-group textarea { flex: 1; padding: 8px; border: 1px solid #333; outline: none; }
        .btn-submit { background: #eee; padding: 8px 25px; border: 1px solid #333; cursor: pointer; font-weight: bold; float: right; }
        .btn-submit:hover { background: #ddd; }
        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="border: 1px solid #333; padding: 5px; font-size: 10px;">LOGO<br>NTU</div>
            <div>
                <h2 style="font-size: 14px;">Trường Đại học Nha Trang</h2>
                <p style="font-size: 11px; font-weight: bold;">KHOA CÔNG NGHỆ THÔNG TIN</p>
            </div>
        </div>
        <div class="username">Nguyễn Tấn Đạt</div>
    </header>

    <aside>
        <ul class="sidebar-menu">
            <li><a th:href="@{/}">Dashboard</a></li>
            <li><a th:href="@{/page/all}">Page - List</a></li>
            <li style="background: #e9e9e9;"><a th:href="@{/page/new}">Page - Addnew</a></li>
            <li><a href="#">Post - List</a></li>
            <li><a href="#">Post - Addnew</a></li>
        </ul>
    </aside>

    <main>
        <h3 style="margin-bottom: 20px;">Thêm mới một Page</h3>
        
        <div class="form-container">
            <form action="/page/new" method="post" class="clearfix">
                
                <div class="form-group">
                    <label>ID:</label>
                    <input type="text" name="id" required placeholder="Nhập ID...">
                </div>

                <div class="form-group">
                    <label>Pagename:</label>
                    <input type="text" name="pName" required>
                </div>

                <div class="form-group">
                    <label>Keyword:</label>
                    <input type="text" name="kword">
                </div>

                <div class="form-group">
                    <label>Content:</label>
                    <textarea name="c" rows="5"></textarea>
                </div>

                <div class="form-group">
                    <label>Parent Page ID:</label>
                    <input type="text" name="pPageId">
                </div>

                <button type="submit" class="btn-submit">Lưu trang</button>
            </form>
        </div>
    </main>

    <footer>
        ©2025 by Nguyễn Tấn Đạt – FIT.NTU
    </footer>
</div>

</body>
</html>
