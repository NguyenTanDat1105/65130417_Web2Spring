<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm mới Sinh viên</title>
    <style>
        .form-group { margin-bottom: 10px; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        input[type="text"] { width: 250px; padding: 5px; }
        .error-msg { color: red; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h2>Thêm Mới Sinh Viên</h2>

    <div class="error-msg" th:if="${err != null}" th:text="${err}"></div>

    <form th:action="@{/savestudent}" method="post">
        <div class="form-group">
            <label>ID:</label>
            <input type="text" name="id" required placeholder="Ví dụ: SV01">
        </div>
        
        <div class="form-group">
            <label>Name:</label>
            <input type="text" name="name" required placeholder="Nhập tên sinh viên">
        </div>
        
        <div class="form-group">
            <label>Group ID:</label>
            <select name="groupId" style="padding: 5px; width: 264px;">
                <option value="Nhóm 1">Nhóm 1</option>
                <option value="Nhóm 2">Nhóm 2</option>
                <option value="Nhóm 3">Nhóm 3</option>
            </select>
        </div>
        
        <div style="margin-top: 15px; padding-left: 125px;">
            <button type="submit" style="padding: 5px 15px; background: #4CAF50; color: white; border: none; cursor: pointer;">Lưu</button>
            <a th:href="@{/student/all}"><button type="button" style="padding: 5px 15px;">Hủy</button></a>
        </div>
    </form>
</body>
</html>
