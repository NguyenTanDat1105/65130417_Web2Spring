<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Topic</title>
    <style>
        table { width: 80%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn-add { display: inline-block; margin-bottom: 10px; text-decoration: none; padding: 5px 10px; background-color: #4CAF50; color: white; border-radius: 3px; }
    </style>
</head>
<body>
    <h2>Danh Sách Topic</h2>
    
    <a class="btn-add" th:href="@{/topic/new}">+ Add new Topic</a>
    
    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>Topic Name</th>
                <th>Supervisor Id</th>
                <th>Topic Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${topics}">
                <td th:text="${t.id}"></td>
                <td th:text="${t.topicName}"></td>
                <td th:text="${t.supervisorId}"></td>
                <td th:text="${t.topicType}"></td>
                <td>
                    <a th:href="@{/topic/view/{id}(id=${t.id})}">[view]</a> | 
                    <a href="#">[edit]</a> | 
                    <a th:href="@{/topic/delete/{id}(id=${t.id})}" onclick="return confirm('Bạn có chắc chắn muốn xóa Topic này không?');">[delete]</a>
                </td>
            </tr>
        </tbody>
    </table>
    
    <br>
    <a th:href="@{/dasdboard}">Quay lại Trang chủ</a>
</body>
</html>
