<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tin.tieuDe}"></title>
    <style>
        body { font-family: Georgia, serif; line-height: 1.8; padding: 40px; }
        .article { max-width: 700px; margin: auto; }
        h1 { color: #222; font-size: 2.5em; }
        .meta { color: #666; font-style: italic; margin-bottom: 20px; }
        .content { font-size: 1.2em; white-space: pre-line; }
        .back-link { margin-top: 30px; display: block; }
    </style>
</head>
<body>
    <div class="article">
        <h1 th:text="${tin.tieuDe}"></h1>
        <div class="meta">
            Loại tin: <span th:text="${tin.loaiTin.tenLoai}"></span>
        </div>
        <div class="content" th:text="${tin.noiDung}"></div>
        
        <a class="back-link" th:href="@{/}">&larr; Quay lại trang chủ</a>
    </div>
</body>
</html>
